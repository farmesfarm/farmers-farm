<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1B3A2D">
<link rel="manifest" href="/manifest.json">
<title>Blog - Farmers Farm</title>
<!-- SEO_META_TAGS -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍵</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css?v=5">
<style>
  body { background: var(--black); color: var(--white); font-family: 'Inter', sans-serif; }
  .blog-header { text-align: center; padding: 60px 20px; background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.05); }
  .blog-header h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 48px; margin-bottom: 16px; }
  .blog-container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
  .blog-ssr-container { max-width: 800px; margin: 60px auto; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 40px; }
  .blog-ssr-title { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 36px; margin-bottom: 24px; line-height: 1.2; }
  .blog-ssr-image { width: 100%; border-radius: 8px; margin-bottom: 32px; object-fit: cover; max-height: 400px; }
  .blog-ssr-body { font-size: 18px; line-height: 1.8; color: rgba(255,255,255,0.85); }
  .blog-ssr-body h2 { color: var(--white); margin: 32px 0 16px; font-family: 'Playfair Display', serif; }
  .blog-ssr-body p { margin-bottom: 20px; }
  
  .blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; max-width: 1200px; margin: 40px auto; padding: 0 20px; }
  .blog-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; overflow: hidden; text-decoration: none; color: inherit; transition: transform 0.3s, border-color 0.3s; display: flex; flex-direction: column; }
  .blog-card:hover { transform: translateY(-5px); border-color: var(--gold); }
  .blog-card-img { width: 100%; height: 200px; object-fit: cover; background: #1a1a1a; }
  .blog-card-content { padding: 24px; display: flex; flex-direction: column; flex: 1; }
  .blog-card-title { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 22px; margin-bottom: 12px; line-height: 1.3; }
  .blog-card-excerpt { font-size: 15px; color: rgba(255,255,255,0.7); line-height: 1.6; margin-bottom: 24px; flex: 1; }
  .blog-card-footer { font-size: 14px; color: var(--gold); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
</style>
</head>
<body>

<nav>
  <div class="nav-logo" onclick="window.location.href='/'" style="cursor:pointer;">
    <span>FARMERS FARM</span>
    <span>Est. 2020 · Pure Harvest</span>
  </div>
</nav>

<div id="blogRoot">
  <!-- BLOG_SSR_CONTENT -->
</div>

<div id="blogListContainer" style="display: none;">
  <div class="blog-header">
    <h1>The Farmers Journal</h1>
    <p style="color: rgba(255,255,255,0.6); max-width: 600px; margin: 0 auto; line-height: 1.6;">Stories from the farm, wellness tips, and deep dives into the world of premium herbal teas.</p>
  </div>
  <div class="blog-grid" id="blogGrid">
    <!-- Loaded via JS -->
    <div style="grid-column: 1/-1; text-align: center; color: var(--mist); padding: 40px;">Loading articles...</div>
  </div>
</div>

<footer>
  <div class="footer-logo"><span>FARMERS FARM</span><span>© 2026 · All Rights Reserved</span></div>
  <p>7 TEA AM · Pure · Natural · Crafted with Love 🌿</p>
</footer>

<script>
  document.addEventListener('DOMContentLoaded', async () => {
    // If SSR content exists, we are on a specific post page.
    const ssrContent = document.querySelector('.blog-ssr-container');
    if (!ssrContent) {
      // Show listing page
      document.getElementById('blogListContainer').style.display = 'block';
      try {
        const res = await fetch('/api/blogs');
        const blogs = await res.json();
        const grid = document.getElementById('blogGrid');
        
        if (blogs.length === 0) {
          grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--mist); padding: 40px;">No articles published yet.</div>';
          return;
        }
        
        grid.innerHTML = blogs.map(b => \`
          <a href="/blog/\${b.slug}" class="blog-card">
            \${b.imageUrl ? \`<img src="\${b.imageUrl}" class="blog-card-img" alt="\${b.title}">\` : '<div class="blog-card-img" style="display:flex;align-items:center;justify-content:center;color:#333;font-size:40px;">🍵</div>'}
            <div class="blog-card-content">
              <h3 class="blog-card-title">\${b.title}</h3>
              <p class="blog-card-excerpt">\${b.excerpt || b.content.substring(0, 100) + '...'}</p>
              <div class="blog-card-footer">Read Story →</div>
            </div>
          </a>
        \`).join('');
      } catch (err) {
        document.getElementById('blogGrid').innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #e74c3c;">Failed to load articles.</div>';
      }
    }
  });
</script>
</body>
</html>
